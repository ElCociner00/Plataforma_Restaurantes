<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AXIOMA | Iniciar sesión</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
</head>

<body>
  <div class="main">
    <h2>Iniciar sesión</h2>

    <p>
      Ingresa con Magic Link para acceder de forma segura.
    </p>

    <form id="loginForm">
      <input id="emailInput" type="email" placeholder="Correo electrónico" autocomplete="email" required>
      <button type="submit">Enviar enlace mágico</button>
    </form>

    <p id="status" aria-live="polite"></p>

    <div class="login-extra">
      <a href="./registro/index.html" class="registro-link">
        ¿No tienes cuenta? Regístrate aquí
      </a>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/public_chrome.js"></script>
  <script type="module" src="js/footer.js"></script>
</body>
</html>
