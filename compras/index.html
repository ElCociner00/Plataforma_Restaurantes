<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AXIOMA | Compras</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/compras.css">
</head>
<body style="display:none">
  <script type="module" src="../js/router.js"></script>
  <script type="module" src="../js/header.js"></script>
  <script type="module" src="../js/local_context_navigation_guard.js"></script>

  <div class="main compras-main">
    <h1>Compras</h1>
    <p id="comprasStatus" class="compras-status"></p>

    <section class="bloque">
      <div class="compras-tabs" role="tablist" aria-label="Vistas de facturas de compras">
        <button id="tabComprasPrincipal" class="compras-tab is-active" type="button">Módulo principal</button>
        <button id="tabComprasNoCorresponde" class="compras-tab" type="button">No corresponde</button>
        <button id="tabComprasLocales" class="compras-tab" type="button">Distribuir locales</button>
        <button id="tabComprasRevisadas" class="compras-tab" type="button">Revisadas</button>
      </div>
      <div id="comprasFacturas" class="compras-facturas"></div>
    </section>

    <section id="comprasDetalle" class="bloque compras-detalle is-hidden">
      <div class="compras-detalle-head">
        <button id="volverFacturas" type="button">← Volver a facturas</button>
        <h2 id="detalleTitulo">Detalle de factura</h2>
      </div>
      <div class="factura-table-wrap">
        <table class="factura-table">
          <thead>
            <tr>
              <th>Productos factura</th>
              <th>Cantidad factura</th>
              <th>Productos sistema</th>
              <th>Cantidad Real</th>
              <th>Medida Sistema</th>
            </tr>
          </thead>
          <tbody id="detalleBody"></tbody>
        </table>
      </div>
      <div class="compras-detalle-checklist">
        <label class="sale-caja-check">
          <input id="saleDeCajaCompras" type="checkbox">
          ¿Esta compra fue pagada por caja (efectivo)?
        </label>
      </div>
      <div class="compras-detalle-actions">
        <button id="enviarCompras" type="button" disabled>Enviar</button>
        <button id="noCorrespondeCompras" type="button" disabled>No corresponde</button>
      </div>
    </section>
  </div>

  <script type="module" src="../js/compras.js"></script>
  <script type="module" src="../js/footer.js"></script>
</body>
</html>
