<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AXIOMA | Gestión de usuarios</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/gestion_usuarios.css">
</head>
<body style="display:none">
  <script type="module" src="../js/router.js"></script>
<script type="module" src="../js/header.js"></script>

  <div class="main">
    <h1>Gestión de usuarios</h1>
    <p class="intro">Administra usuarios de la empresa y su estado activo/inactivo en un solo lugar.</p>
    <div id="gestionUsuariosEstado" class="status"></div>

    <section class="bloque" style="margin:16px auto;max-width:700px">
      <h2>Registrar usuarios</h2>
      <label for="tipoRegistroUsuario">Tipo de registro</label>
      <select id="tipoRegistroUsuario">
        <option value="">Selecciona</option>
        <option value="empleado">Empleado</option>
        <option value="otro">Admin o Revisor</option>
      </select>

      <form id="formRegistroEmpleado" hidden style="display:none;margin-top:10px">
        <input id="emp_nombre" type="text" placeholder="Nombre completo" required>
        <input id="emp_cedula" type="text" placeholder="Cédula" required>
        <input id="emp_fecha_ingreso" type="date" required>
        <input id="emp_email" type="email" placeholder="Correo" required>
        <input id="emp_password" type="password" placeholder="Contraseña" autocomplete="new-password" required>
        <button id="btnRegistrarEmpleadoInline" type="submit">Registrar empleado</button>
      </form>

      <form id="formRegistroOtro" hidden style="display:none;margin-top:10px">
        <input id="otro_nombre" type="text" placeholder="Nombre completo" required>
        <input id="otro_cedula" type="text" placeholder="Cédula" required>
        <input id="otro_email" type="email" placeholder="Correo" required>
        <input id="otro_password" type="password" placeholder="Contraseña" autocomplete="new-password" required>
        <select id="otro_rol" required>
          <option value="">Selecciona rol</option>
          <option value="admin">Admin</option>
          <option value="revisor">Revisor</option>
        </select>
        <button id="btnRegistrarOtroInline" type="submit">Registrar usuario</button>
      </form>
      <div id="registroInlineEstado"></div>
    </section>

    <div id="gestionUsuariosPanel"></div>

    <section class="bloque" style="margin-top:20px;max-width:480px">
      <h2>Cambiar tu contraseña</h2>
      <form id="cambiarContrasenaForm" style="display:grid;gap:10px;justify-items:center;text-align:center;max-width:420px;margin:0 auto">
        <label for="actualPassword">Contraseña actual</label>
        <div><input id="actualPassword" type="password" autocomplete="current-password" required> <button type="button" data-toggle-pass="actualPassword">👁️</button></div>
        <label for="nuevoPassword">Nueva contraseña</label>
        <div><input id="nuevoPassword" type="password" autocomplete="new-password" required> <button type="button" data-toggle-pass="nuevoPassword">👁️</button></div>
        <button type="submit">Actualizar contraseña</button>
      </form>
      <div id="cambiarContrasenaEstado"></div>
    </section>
  </div>

  <script type="module" src="../js/gestion_usuarios.js"></script>
  <script type="module" src="../js/footer.js"></script>
  <!-- Parche de autenticación para módulos (aislado) -->
  <script type="module" src="../js/module_fix/init.js"></script>
</body>
</html>
