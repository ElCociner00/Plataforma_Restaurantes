<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AXIOMA | Credibanco</title>

  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/loggro.css">
</head>

<body style="display:none">

  <!-- Guardia de autenticación -->
  <script type="module" src="../js/router.js"></script>

  <!-- Guardia de permisos -->
<!-- Header -->
  <script type="module" src="../js/header.js"></script>

  <div class="main">
    <h1>Credibanco</h1>
    <p class="descripcion">
      Configura las credenciales de Credibanco para habilitar las integraciones de pagos.
    </p>

    <form id="credibancoForm" class="formulario" autocomplete="off" data-lpignore="true">
      <div class="campo">
        <label for="credibancoClientId">Client ID</label>
        <p class="ayuda">Ingresa el Client ID entregado por Credibanco.</p>
        <input id="credibancoClientId" name="credibanco_client_id_no_autofill" type="text" required autocomplete="off" autocapitalize="off" spellcheck="false" data-lpignore="true" value="">
      </div>

      <div class="campo">
        <label for="credibancoClientSecret">Client Secret</label>
        <p class="ayuda">Ingresa el Client Secret entregado por Credibanco.</p>
        <div class="password-wrap">
          <input id="credibancoClientSecret" name="credibanco_client_secret_no_autofill" type="password" required autocomplete="new-password" autocapitalize="off" spellcheck="false" data-lpignore="true" value="">
          <button type="button" id="toggleCredibancoSecret" class="btn-ojito" aria-label="Mostrar client secret">👁</button>
        </div>
      </div>

      <button type="submit">Guardar credenciales</button>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script type="module" src="../js/credibanco.js"></script>
  <script type="module" src="../js/footer.js"></script>
  <!-- Parche de autenticación para módulos (aislado) -->
  <script type="module" src="../js/module_fix/init.js"></script>
</body>
</html>
