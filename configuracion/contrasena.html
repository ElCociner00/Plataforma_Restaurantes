<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AXIOMA | Restablecer contraseña</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div class="main" style="max-width:460px">
    <h1>Restablecer contraseña</h1>
    <form id="resetPasswordForm">
      <label for="nuevaContrasena">Nueva contraseña</label>
      <input id="nuevaContrasena" type="password" required autocomplete="new-password">
      <button type="submit">Actualizar contraseña</button>
    </form>
    <p id="estadoReset"></p>
  </div>
  <script type="module" src="../js/contrasena_reset_page.js"></script>
</body>
</html>
