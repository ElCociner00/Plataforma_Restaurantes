<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AXIOMA | Gestión de Empresas (Superadmin)</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/gestion_empresas.css">
</head>
<body style="display:none" data-defer-reveal="true">
  <script type="module" src="../js/router.js"></script>
  <script type="module" src="../js/header.js"></script>
  <script type="module" src="../js/gestion_empresas.js"></script>

  <main class="main gestion-empresas-main">
    <h1>Gestión global de empresas</h1>
    <p class="helper-text">Módulo principal de superadmin para administrar plan, estado general y banner de impago de todas las empresas.</p>

    <div class="toolbar">
      <button id="btnRecargar" type="button">Recargar</button>
      <button id="btnRevisionPagos" type="button">Revisión de pagos</button>
      <span id="estadoAccion" aria-live="polite"></span>
    </div>

    <div class="table-wrap">
      <table id="tablaEmpresas">
        <thead>
          <tr>
            <th>Empresa</th>
            <th>Plan</th>
            <th>Estado negocio</th>
            <th>Banner impago</th>
            <th>Deuda actual</th>
            <th>Último corte</th>
            <th>Registro</th>
          </tr>
        </thead>
        <tbody id="empresasBody">
          <tr>
            <td colspan="7">Cargando empresas...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script type="module" src="../js/footer.js"></script>
</body>
</html>
